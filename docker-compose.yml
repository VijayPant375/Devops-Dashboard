version: "3.9"

services:
  web:
    build: .
    container_name: devops-dashboard
    ports:
      - "5000:5000"
    environment:
      - APP_ENV=development
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
