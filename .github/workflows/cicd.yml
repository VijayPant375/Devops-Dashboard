# ─────────────────────────────────────────────────────────────────────────────
# GitHub Actions — CI/CD Pipeline
# Triggers on every push to main or a pull request against main.
#
# Pipeline:
#   1. Lint & test the Flask app
#   2. Build Docker image
#   3. Push to DockerHub
#   4. SSH into AWS EC2 and deploy the new image
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/devops-dashboard
  CONTAINER_NAME: devops-dashboard

jobs:

  # ── Job 1: Test ─────────────────────────────────────────────────────────────
  test:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-flask

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short || echo "No tests found — skipping"

      - name: Verify app syntax
        run: python -c "import app; print('✓ App imports successfully')"

  # ── Job 2: Build & Push ──────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    # Only push on actual pushes to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image on DockerHub
        run: |
          echo "✓ Image pushed: ${{ env.IMAGE_NAME }}:latest"
          echo "✓ SHA tag:      ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"

  # ── Job 3: Deploy to EC2 ─────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "──────────────────────────────────────"
            echo " DevOps Dashboard — Deploying..."
            echo "──────────────────────────────────────"

            # Pull the latest image from DockerHub
            docker pull ${{ env.IMAGE_NAME }}:latest

            # Stop and remove any existing container
            docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            docker rm   ${{ env.CONTAINER_NAME }} 2>/dev/null || true

            # Run the new container
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p 80:5000 \
              -e APP_ENV=production \
              ${{ env.IMAGE_NAME }}:latest

            # Wait a moment, then verify health
            sleep 5
            docker ps | grep ${{ env.CONTAINER_NAME }}

            # Quick health check
            curl -sf http://localhost/health && echo "✓ Health check passed" || echo "⚠ Health check failed"

            # Clean up old dangling images to save disk space
            docker image prune -f

            echo "✓ Deployment complete!"
